<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
    function dragstartHandler(ev) {
        ev.dataTransfer.setData("text", ev.target.id);
    }
    function dragoverHandler(ev) {
        ev.preventDefault();
    }
    let score = 0;
    function letter_validation(ev) {
    ev.preventDefault();

    const blockId = ev.dataTransfer.getData("text");
    const block = document.getElementById(blockId);
    const draggedLetter = block.innerText;

    const expectedLetter = ev.target.dataset.expected;
    if (!expectedLetter || ev.target.children.length > 0) {
        return;
    }
    ev.target.appendChild(block);

    // always update remaining-blocks based on what's still in the source row
    const remainingBlocks = document.querySelectorAll(".blocks-row .block").length;
    if (remainingBlocks === 0) {
        confetti({
            particleCount: 300,
            spread: 150,
            startVelocity: 50,
            origin: { y: 0.6 }
        });

        document.getElementById("text").innerText = "Well done! You placed all the blocks.";
        on();
    }

    if (draggedLetter === expectedLetter) {
        block.draggable = false;
        ev.target.style.backgroundColor = "lightgreen";
        score += 10;
        console.log("Score:", score);
        document.getElementById("score").innerText = score;

        if (score === 100) {
            confetti({
                particleCount: 150,
                spread: 90,
                origin: { y: 0.6 }
            });

            document.getElementById("text").innerText = 
            "PERFECT SCORE!! You can save score and logout or start a new game.";
            on();
            confetti({
                particleCount: 150,
                spread: 90,
                origin: { y: 0.6 }
            });
        }
    } else {
        console.log("Wrong letter");
        ev.target.style.backgroundColor = "red";
    }
}
    function on() {
        document.getElementById("overlay").style.display = "block";
    }
    function off() {
        document.getElementById("overlay").style.display = "none";
    }
    function sendScoreToServer() {
    fetch("/add_score", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            score: score
        })
    })
    .then(response => response.text())
    .then(data => {
        console.log("Server:", data);
    })
    .catch(error => {
        console.error("Error:", error);
    });
}
</script>

<meta charset="UTF-8">
<title>Blocs</title>
<style>

.container {
    display: grid;
    grid-template-columns: repeat(5,100px);
    background-color: rgb(177, 40, 40);
    grid-auto-rows:100px;
    padding:10px;
}
.container> div {
    border:1px solid black;
    background-color: rgb(205, 208, 245);
    padding: 10px;
    font-size:30px;
    text-align:center;
}
.grid-wrapper{
    display: flex;
    justify-content: center;
    margin-top:20px;
}
.block {
    width: 60px;
    height: 60px;
    background: black;
    border-radius: 12px;
    display:flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    color: white;
    cursor: grab;
    user-select: none;
}
.piece {
    display: grid;
    gap: 0px;
}
.blocks-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
}
#overlay {
  position: fixed;
  display: none;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(0, 0, 0, 0.724);
  z-index: 2;
  cursor: pointer;
}

#text{
  position: absolute;
  top: 50%;
  left: 50%;
  font-size: 50px;
  color: white;
  transform: translate(-50%,-50%);
  -ms-transform: translate(-50%,-50%);
}
</style>
</head>
<body>

    <h1 style="text-align:center;">Blocs</h1>
    <br>
    <h3>High score: {{ high_score }}</h3>
    <div style="float: right;">
        <div style="margin-bottom: 10px;">
        <form action="{{ url_for('new_game') }}" method="POST">
    <select style="font-size:15px; width: 100px; height: 35px;" name="difficulty" required>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>
    <br>
    <button style="font-size:15px; width: 100px; height: 35px;" type="submit">Next game</button>
    </form>
    </div>
        <button style="font-size:15px; width: 100px; height: 35px;" onclick="on()">Pause</button>
    </div>
    <div id="overlay" onclick="off()">
    <div  id="text">Click anywhere to continue</div>
    </div>
    <br>
    <br>
    </div>    <h2 style="float: center; text-align: center;">Current Score: <span id="score">0</span></h2>


<div class="grid-wrapper">
  <div class="container">
    {% for r in range(5) %}
      {% for c in range(5) %}
        
        {% if grid[r][c] == "" %}
          <div
            data-expected="{{ solution[r][c] }}"
            ondrop="letter_validation(event)"
            ondragover="dragoverHandler(event)">
          </div>
        {% else %}
          <div>{{ grid[r][c] }}</div>
        {% endif %}

      {% endfor %}
    {% endfor %}
  </div>
</div>

<h2 style="text-align:center;"></h2>
<div id="div1" ondrop="letter_validation(event)" ondragover="dragoverHandler(event)">
</div>
<div class="blocks-row">
  {% for letter in blocks %}
    <div class="block"
         id="block{{ loop.index }}"
         draggable="true"
         ondragstart="dragstartHandler(event)">{{ letter }}</div>
  {% endfor %}
</div>

    <button style="float: right; font-size:15px; width: 90px; height: 40px;" onclick="sendScoreToServer()">Save Score</button>

<br>

    <form action="/logout" method="POST">
        <button style="font-size:15px; width: 90px; height: 30px;"  type="submit">Logout</button>
    </form>
</body>
</html>
